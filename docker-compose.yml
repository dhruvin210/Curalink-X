version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: curalinkx-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: curalinkx-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/curalinkx
      FRONTEND_URL: http://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.1}
      PUBMED_BASE_URL: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
      OPENALEX_BASE_URL: https://api.openalex.org
      CLINICAL_TRIALS_BASE_URL: https://clinicaltrials.gov/api/v2
      CACHE_TTL_HOURS: 12
      INITIAL_RESULT_TARGET: 80
      FINAL_RESULT_TARGET: 8
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: curalinkx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
